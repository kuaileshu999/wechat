server:
  port: 8080

spring:
  application:
    name: edu-chat
  datasource:
    url: jdbc:h2:mem:educhat;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false