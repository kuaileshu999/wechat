<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no,email=no,address=no" />
    <title>聊天</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --primary: #2f63c7;
        --primary-press: #2450a6;
        --danger: #d92d20;
        --shadow: 0 10px 28px rgba(17, 24, 39, 0.10);
        --radius: 14px;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --maxw: 820px;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 16px/1.4 -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", "Noto Sans CJK SC", "Noto Sans SC", Arial, sans-serif;
      }
      button, input, textarea { font: inherit; }
      .app {
        height: 100%;
        display: flex;
        justify-content: center;
        padding: calc(10px + var(--safe-top)) 12px calc(10px + var(--safe-bottom));
      }
      .frame {
        width: 100%;
        max-width: var(--maxw);
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 12px;
      }
      .title {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .title h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 950;
        letter-spacing: 0.2px;
      }
      .pill {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 900;
        border: 1px solid transparent;
        user-select: none;
      }
      .pill.on { background: rgba(15, 157, 88, 0.10); color: #0b7a43; border-color: rgba(15, 157, 88, 0.25); }
      .pill.off { background: rgba(217, 45, 32, 0.10); color: var(--danger); border-color: rgba(217, 45, 32, 0.25); }
      .right {
        position: relative;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .icon-btn {
        border: 1px solid rgba(17, 24, 39, 0.10);
        background: #fff;
        border-radius: 12px;
        width: 40px;
        height: 40px;
        padding: 0;
        font-weight: 900;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .icon-btn svg { width: 20px; height: 20px; }
      .icon-btn:active { transform: translateY(1px); }
      .menu {
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        width: min(320px, calc(100vw - 24px));
        padding: 10px;
        border-radius: 14px;
        border: 1px solid rgba(17, 24, 39, 0.10);
        background: #fff;
        box-shadow: 0 18px 44px rgba(17, 24, 39, 0.14);
        display: none;
        z-index: 20;
      }
      .menu.is-open { display: block; }
      .menu-title {
        font-weight: 950;
        margin: 2px 2px 10px;
      }
      .menu-desc {
        margin: 0 2px 10px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
      }
      .menu-actions {
        display: grid;
        gap: 10px;
      }
      .btn {
        border: 0;
        border-radius: 12px;
        padding: 12px 12px;
        font-weight: 950;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active { transform: translateY(1px); }
      .btn-primary { background: var(--primary); color: #fff; }
      .btn-primary:active { background: var(--primary-press); }
      .btn-ghost { background: #fff; color: var(--text); border: 1px solid rgba(17, 24, 39, 0.14); }
      .btn-danger { background: rgba(217, 45, 32, 0.10); color: var(--danger); border: 1px solid rgba(217, 45, 32, 0.22); }
      .btn-danger:active { background: rgba(217, 45, 32, 0.14); }
      .is-hidden { display: none !important; }
      .messages {
        min-height: 0;
        padding: 12px;
        overflow: auto;
      }
      .msg-row {
        display: flex;
        margin: 10px 0;
      }
      .msg-row.user { justify-content: flex-end; }
      .msg-row.ai { justify-content: flex-start; }
      .bubble {
        max-width: min(560px, 92%);
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(17, 24, 39, 0.10);
        white-space: pre-wrap;
        word-break: break-word;
        font-weight: 650;
      }
      .bubble.user {
        background: rgba(47, 99, 199, 0.10);
        border-color: rgba(47, 99, 199, 0.22);
        color: #14346e;
      }
      .bubble.ai {
        background: #fff;
        color: var(--text);
      }
      .meta {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
        font-weight: 650;
      }
      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 12px;
      }
      .hint {
        grid-column: 1 / -1;
        font-size: 12px;
        color: var(--muted);
        font-weight: 650;
        padding: 0 2px;
        display: none;
      }
      .hint.is-show { display: block; }
      .input {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 12px;
        outline: none;
        background: #fff;
        box-shadow: inset 0 1px 0 rgba(17, 24, 39, 0.02);
      }
      .input:focus { border-color: rgba(47, 99, 199, 0.55); box-shadow: 0 0 0 3px rgba(47, 99, 199, 0.12); }
      .send-btn {
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font-weight: 950;
        cursor: pointer;
        background: var(--primary);
        color: #fff;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .send-btn:active { background: var(--primary-press); transform: translateY(1px); }
      .send-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
      .toast {
        position: fixed;
        left: 50%;
        bottom: calc(16px + var(--safe-bottom));
        transform: translateX(-50%);
        background: rgba(17, 24, 39, 0.92);
        color: #fff;
        padding: 10px 12px;
        border-radius: 12px;
        font-weight: 800;
        font-size: 13px;
        display: none;
        z-index: 30;
      }
      .toast.is-show { display: block; }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="frame">
        <div class="card topbar">
          <div class="title">
            <h1>聊天</h1>
          </div>
          <div class="right">
            <div id="aiPill" class="pill on">AI 托管中</div>
            <button id="settingsBtn" class="icon-btn" type="button" aria-label="设置">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-1.41 3.41h-.2a2 2 0 0 1-1.42-.59l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.2a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-1.42.59H3.6a2 2 0 0 1-1.41-3.41l.06-.06A1.65 1.65 0 0 0 2.58 15a1.65 1.65 0 0 0-1.51-1H1a2 2 0 0 1 0-4h.2a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06A2 2 0 0 1 3.6 2.6h.2a2 2 0 0 1 1.42.59l.06.06a1.65 1.65 0 0 0 1.82.33h0A1.65 1.65 0 0 0 8.1 2.1V2a2 2 0 0 1 4 0v.2a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 1.42-.59h.2a2 2 0 0 1 1.41 3.41l-.06.06a1.65 1.65 0 0 0-.33 1.82v0A1.65 1.65 0 0 0 21.9 11.1H22a2 2 0 0 1 0 4h-.2a1.65 1.65 0 0 0-1.51 1Z"></path>
              </svg>
            </button>
            <div id="menu" class="menu" role="dialog" aria-modal="false">
              <div class="menu-title">AI 托管</div>
              <p id="menuDesc" class="menu-desc"></p>
              <div class="menu-actions">
                <button id="disable15Btn" class="btn btn-primary" type="button">临时关闭 15 分钟</button>
                <button id="extend15Btn" class="btn btn-ghost is-hidden" type="button">再关闭 15 分钟</button>
                <button id="disableForeverBtn" class="btn btn-danger" type="button">永久关闭</button>
                <button id="closeMenuBtn" class="btn btn-ghost" type="button">关闭</button>
              </div>
            </div>
          </div>
        </div>

        <div id="messages" class="card messages" aria-live="polite"></div>

        <form id="composer" class="card composer">
          <input id="input" class="input" type="text" placeholder="输入消息，回车发送" autocomplete="off" />
          <button id="sendBtn" class="send-btn" type="submit">发送</button>
          <div id="hint" class="hint">AI 正在回复中，人工回复将暂停 15 分钟</div>
        </form>
      </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
      const STORAGE_KEYS = {
        disableUntil: "ai_hosting_disable_until_v1",
        disabledForever: "ai_hosting_disabled_forever_v1",
      };

      const state = {
        messages: [],
        isWaiting: false,
        toastTimer: null,
        tickTimer: null,
        aiAbortController: null,
        aiTypingId: null,
        aiRequestId: null,
      };

      const $ = (id) => document.getElementById(id);
      const aiPill = $("aiPill");
      const messagesEl = $("messages");
      const formEl = $("composer");
      const inputEl = $("input");
      const sendBtn = $("sendBtn");
      const hintEl = $("hint");
      const toastEl = $("toast");
      const settingsBtn = $("settingsBtn");
      const menuEl = $("menu");
      const menuDescEl = $("menuDesc");
      const disable15Btn = $("disable15Btn");
      const extend15Btn = $("extend15Btn");
      const disableForeverBtn = $("disableForeverBtn");
      const closeMenuBtn = $("closeMenuBtn");

      function nowMs() {
        return Date.now();
      }

      function readBool(key) {
        try {
          return localStorage.getItem(key) === "1";
        } catch {
          return false;
        }
      }

      function writeBool(key, value) {
        try {
          localStorage.setItem(key, value ? "1" : "0");
        } catch {}
      }

      function readNumber(key) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return null;
          const n = Number(raw);
          return Number.isFinite(n) ? n : null;
        } catch {
          return null;
        }
      }

      function getDisableUntilMs() {
        return readNumber(STORAGE_KEYS.disableUntil);
      }

      function writeNumber(key, value) {
        try {
          if (value == null) localStorage.removeItem(key);
          else localStorage.setItem(key, String(value));
        } catch {}
      }

      function isAiHostingEnabled() {
        const disabledForever = readBool(STORAGE_KEYS.disabledForever);
        if (disabledForever) return false;
        const disableUntil = readNumber(STORAGE_KEYS.disableUntil);
        if (!disableUntil) return true;
        return nowMs() >= disableUntil;
      }

      function getDisableRemainingMs() {
        const disableUntil = getDisableUntilMs();
        if (!disableUntil) return 0;
        return Math.max(0, disableUntil - nowMs());
      }

      function formatRemaining(ms) {
        const totalSeconds = Math.ceil(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}分${String(seconds).padStart(2, "0")}秒`;
      }

      function showToast(text) {
        toastEl.textContent = text;
        toastEl.classList.add("is-show");
        if (state.toastTimer) window.clearTimeout(state.toastTimer);
        state.toastTimer = window.setTimeout(() => {
          toastEl.classList.remove("is-show");
        }, 1600);
      }

      function openMenu() {
        menuEl.classList.add("is-open");
        renderMenu();
      }

      function closeMenu() {
        menuEl.classList.remove("is-open");
      }

      function toggleMenu() {
        if (menuEl.classList.contains("is-open")) closeMenu();
        else openMenu();
      }

      function humanTime(tsMs) {
        try {
          const d = new Date(tsMs);
          const hh = String(d.getHours()).padStart(2, "0");
          const mm = String(d.getMinutes()).padStart(2, "0");
          return `${hh}:${mm}`;
        } catch {
          return "";
        }
      }

      function appendMessage(role, text) {
        const msg = { id: `${nowMs()}_${Math.random().toString(16).slice(2)}`, role, text, ts: nowMs() };
        state.messages.push(msg);
        renderMessages();
        scrollToBottom();
      }

      function renderHint() {
        hintEl.classList.toggle("is-show", !!state.isWaiting);
      }

      function setWaiting(value) {
        state.isWaiting = value;
        renderHint();
      }

      function abortPendingAi() {
        if (state.aiAbortController) {
          try {
            state.aiAbortController.abort();
          } catch {}
        }
        state.aiAbortController = null;
        state.aiRequestId = null;

        if (state.aiTypingId) {
          const idx = state.messages.findIndex((m) => m.id === state.aiTypingId);
          if (idx >= 0) state.messages.splice(idx, 1);
          state.aiTypingId = null;
          renderMessages();
          scrollToBottom();
        }
        setWaiting(false);
      }

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function renderMessages() {
        if (state.messages.length === 0) {
          messagesEl.innerHTML = `<div style="color: var(--muted); font-weight: 650; padding: 6px;">发送一条消息开始聊天。</div>`;
          return;
        }
        const html = state.messages
          .map((m) => {
            const roleClass = m.role === "user" ? "user" : "ai";
            const label = m.role === "user" ? "你" : "AI";
            return `
              <div class="msg-row ${roleClass}">
                <div>
                  <div class="bubble ${roleClass}">${escapeHtml(m.text)}</div>
                  <div class="meta">${label} · ${humanTime(m.ts)}</div>
                </div>
              </div>
            `;
          })
          .join("");
        messagesEl.innerHTML = html;
      }

      function renderMenu() {
        const disabledForever = readBool(STORAGE_KEYS.disabledForever);
        const enabled = isAiHostingEnabled();
        const remaining = getDisableRemainingMs();
        const disableUntil = getDisableUntilMs();

        if (disabledForever) {
          menuDescEl.textContent = "已永久关闭 AI 托管：不会再自动回复。";
          disable15Btn.disabled = true;
          extend15Btn.classList.add("is-hidden");
          disableForeverBtn.disabled = false;
          disableForeverBtn.className = "btn btn-primary";
          disableForeverBtn.textContent = "重新开启 AI 托管";
          return;
        }

        if (enabled) {
          menuDescEl.textContent = "AI 托管开启：你发送后，AI 会自动回复。";
          disable15Btn.disabled = false;
          disableForeverBtn.disabled = false;
          disable15Btn.textContent = "临时关闭 15 分钟";
          extend15Btn.classList.add("is-hidden");
          disableForeverBtn.className = "btn btn-danger";
          disableForeverBtn.textContent = "永久关闭";
          return;
        }

        menuDescEl.textContent =
          remaining > 0 && disableUntil
            ? `AI 托管临时关闭中：将于 ${humanTime(disableUntil)} 自动开启（剩余 ${formatRemaining(remaining)}）。可立即开启或再关闭 15 分钟。`
            : "AI 托管已关闭。";
        disable15Btn.disabled = false;
        disableForeverBtn.disabled = false;
        disable15Btn.textContent = "立即开启";
        extend15Btn.classList.remove("is-hidden");
        disableForeverBtn.className = "btn btn-danger";
        disableForeverBtn.textContent = "永久关闭";
      }

      function renderAiPill() {
        const disabledForever = readBool(STORAGE_KEYS.disabledForever);
        const enabled = isAiHostingEnabled();
        const remaining = getDisableRemainingMs();
        const disableUntil = getDisableUntilMs();

        if (disabledForever) {
          aiPill.className = "pill off";
          aiPill.textContent = "AI 已永久关闭";
          return;
        }

        if (enabled) {
          aiPill.className = "pill on";
          aiPill.textContent = "AI 托管中";
          return;
        }

        aiPill.className = "pill off";
        aiPill.textContent =
          remaining > 0 && disableUntil
            ? `AI 将于 ${humanTime(disableUntil)} 开启（${formatRemaining(remaining)}）`
            : "AI 已关闭";
      }

      async function requestAiReply(text, signal) {
        const endpoint = typeof window.AI_CHAT_ENDPOINT === "string" ? window.AI_CHAT_ENDPOINT.trim() : "";
        if (endpoint) {
          const payload = {
            messages: state.messages.map((m) => ({
              role: m.role === "user" ? "user" : "assistant",
              content: m.text,
            })),
            latest_user_message: text,
          };
          const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            signal,
          });
          if (!res.ok) {
            const t = await res.text().catch(() => "");
            throw new Error(`AI 请求失败 (${res.status}) ${t}`.trim());
          }
          const data = await res.json().catch(() => null);
          const reply = data && (data.reply || data.text || data.message);
          if (typeof reply !== "string" || !reply.trim()) throw new Error("AI 返回为空");
          return reply.trim();
        }

        const trimmed = String(text || "").trim();
        if (!trimmed) return "我在。";
        if (trimmed.length <= 10) return `收到：${trimmed}。你想继续聊什么？`;
        return `收到你的消息（${trimmed.length} 字）。我先简单复述一下：\n${trimmed.slice(0, 80)}${trimmed.length > 80 ? "…" : ""}`;
      }

      async function handleSend(text) {
        const trimmed = String(text || "").trim();
        if (!trimmed) return;

        appendMessage("user", trimmed);
        inputEl.value = "";

        if (state.isWaiting) {
          abortPendingAi();
          disableAiFor15Minutes("AI 正在回复中，人工回复将暂停 15 分钟");
          return;
        }

        if (!isAiHostingEnabled()) {
          showToast("AI 托管已关闭：不会自动回复");
          return;
        }

        abortPendingAi();
        setWaiting(true);
        const requestId = `${nowMs()}_${Math.random().toString(16).slice(2)}`;
        state.aiRequestId = requestId;
        const controller = new AbortController();
        state.aiAbortController = controller;

        const typingId = `${nowMs()}_typing`;
        state.aiTypingId = typingId;
        state.messages.push({ id: typingId, role: "ai", text: "正在输入…", ts: nowMs() });
        renderMessages();
        scrollToBottom();

        try {
          const reply = await requestAiReply(trimmed, controller.signal);
          if (state.aiRequestId !== requestId) return;
          const idx = state.messages.findIndex((m) => m.id === typingId);
          if (idx >= 0) state.messages.splice(idx, 1);
          state.aiTypingId = null;
          appendMessage("ai", reply);
        } catch (e) {
          if (e && e.name === "AbortError") return;
          if (state.aiRequestId !== requestId) return;
          const idx = state.messages.findIndex((m) => m.id === typingId);
          if (idx >= 0) state.messages.splice(idx, 1);
          state.aiTypingId = null;
          renderMessages();
          scrollToBottom();
          showToast(e && e.message ? e.message : "AI 请求失败");
        } finally {
          if (state.aiRequestId === requestId) {
            state.aiAbortController = null;
            state.aiRequestId = null;
            setWaiting(false);
          }
          inputEl.focus();
        }
      }

      function setupTick() {
        if (state.tickTimer) window.clearInterval(state.tickTimer);
        state.tickTimer = window.setInterval(() => {
          const remaining = getDisableRemainingMs();
          const disabledForever = readBool(STORAGE_KEYS.disabledForever);
          if (disabledForever) {
            renderAiPill();
            if (menuEl.classList.contains("is-open")) renderMenu();
            return;
          }
          if (remaining > 0) {
            renderAiPill();
            if (menuEl.classList.contains("is-open")) renderMenu();
            return;
          }
          const hasDisableUntil = readNumber(STORAGE_KEYS.disableUntil);
          if (hasDisableUntil) {
            writeNumber(STORAGE_KEYS.disableUntil, null);
            renderAiPill();
            if (menuEl.classList.contains("is-open")) renderMenu();
            showToast("AI 托管已自动恢复");
          }
        }, 1000);
      }

      function disableAiFor15Minutes(message) {
        if (readBool(STORAGE_KEYS.disabledForever)) {
          showToast("AI 已永久关闭");
          return;
        }
        const current = getDisableUntilMs();
        const base = current && current > nowMs() ? current : nowMs();
        const until = base + 15 * 60 * 1000;
        writeNumber(STORAGE_KEYS.disableUntil, until);
        renderAiPill();
        renderMenu();
        if (message) showToast(message);
      }

      function disableAiForever() {
        writeBool(STORAGE_KEYS.disabledForever, true);
        writeNumber(STORAGE_KEYS.disableUntil, null);
        renderAiPill();
        renderMenu();
        showToast("已永久关闭 AI 托管");
      }

      function enableAiHosting() {
        writeBool(STORAGE_KEYS.disabledForever, false);
        writeNumber(STORAGE_KEYS.disableUntil, null);
        renderAiPill();
        renderMenu();
        showToast("已开启 AI 托管");
      }

      function onToggleForever() {
        const disabledForever = readBool(STORAGE_KEYS.disabledForever);
        if (disabledForever) enableAiHosting();
        else disableAiForever();
      }

      function onDocClick(e) {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        if (menuEl.contains(target) || settingsBtn.contains(target)) return;
        closeMenu();
      }

      function init() {
        renderMessages();
        renderAiPill();
        renderHint();
        setupTick();

        settingsBtn.addEventListener("click", toggleMenu);
        closeMenuBtn.addEventListener("click", closeMenu);
        disable15Btn.addEventListener("click", () => {
          if (readBool(STORAGE_KEYS.disabledForever)) {
            showToast("AI 已永久关闭");
            return;
          }
          if (isAiHostingEnabled()) {
            disableAiFor15Minutes("已临时关闭 15 分钟");
            return;
          }
          writeNumber(STORAGE_KEYS.disableUntil, null);
          renderAiPill();
          renderMenu();
          showToast("已开启 AI 托管");
        });
        extend15Btn.addEventListener("click", () => {
          if (readBool(STORAGE_KEYS.disabledForever)) {
            showToast("AI 已永久关闭");
            return;
          }
          if (isAiHostingEnabled()) {
            disableAiFor15Minutes("已临时关闭 15 分钟");
            return;
          }
          disableAiFor15Minutes("已再关闭 15 分钟");
        });
        disableForeverBtn.addEventListener("click", onToggleForever);
        document.addEventListener("click", onDocClick);

        formEl.addEventListener("submit", (e) => {
          e.preventDefault();
          handleSend(inputEl.value);
        });

        inputEl.focus();
      }

      init();
    </script>
  </body>
</html>
