<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>新建收货地址</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #111827;
        --sub: #6b7280;
        --line: rgba(17, 24, 39, 0.08);
        --primary: #2563eb;
        --danger: #ef4444;
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
      }

      .page {
        min-height: 100%;
        padding: 14px 14px calc(88px + env(safe-area-inset-bottom));
      }

      .title {
        font-size: 18px;
        font-weight: 700;
        margin: 6px 4px 12px;
      }

      .card {
        background: var(--card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 6px 22px rgba(17, 24, 39, 0.06);
      }

      .row {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 12px;
        align-items: center;
        padding: 14px 14px;
        border-bottom: 1px solid var(--line);
      }

      .row:last-child {
        border-bottom: none;
      }

      .label {
        font-size: 14px;
        color: var(--sub);
      }

      .field {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      input,
      textarea {
        width: 100%;
        border: none;
        outline: none;
        font-size: 16px;
        color: var(--text);
        background: transparent;
        padding: 0;
        min-width: 0;
      }

      textarea {
        resize: none;
        min-height: 54px;
        line-height: 1.5;
      }

      input::placeholder,
      textarea::placeholder {
        color: rgba(107, 114, 128, 0.7);
      }

      .hint {
        font-size: 12px;
        color: var(--sub);
        margin: 10px 6px 0;
      }

      .footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
        background: linear-gradient(to top, rgba(246, 247, 251, 1), rgba(246, 247, 251, 0.7));
        backdrop-filter: blur(10px);
      }

      .btn {
        width: 100%;
        height: 46px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        color: #ffffff;
        background: var(--primary);
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
      }

      .btn:disabled {
        opacity: 0.55;
        box-shadow: none;
      }

      .error {
        color: var(--danger);
        font-size: 12px;
        margin: 10px 6px 0;
        display: none;
      }

      .switch {
        width: 46px;
        height: 28px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(107, 114, 128, 0.12);
        position: relative;
        flex: 0 0 auto;
      }

      .switch input {
        width: 100%;
        height: 100%;
        opacity: 0;
        margin: 0;
        position: absolute;
        inset: 0;
      }

      .switch::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 3px 10px rgba(17, 24, 39, 0.18);
        transition: transform 160ms ease, background 160ms ease;
      }

      .switch[data-on="true"] {
        background: rgba(37, 99, 235, 0.24);
        border-color: rgba(37, 99, 235, 0.35);
      }

      .switch[data-on="true"]::after {
        transform: translateX(18px);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: calc(70px + env(safe-area-inset-bottom));
        transform: translateX(-50%);
        background: rgba(17, 24, 39, 0.9);
        color: #ffffff;
        font-size: 14px;
        padding: 10px 12px;
        border-radius: 12px;
        max-width: calc(100vw - 28px);
        display: none;
      }

      .arrow {
        flex: 0 0 auto;
        width: 18px;
        height: 18px;
        border-right: 2px solid rgba(107, 114, 128, 0.55);
        border-bottom: 2px solid rgba(107, 114, 128, 0.55);
        transform: rotate(-45deg);
        margin-left: 6px;
      }

      .picker-mask {
        position: fixed;
        inset: 0;
        background: rgba(17, 24, 39, 0.38);
        display: none;
        align-items: flex-end;
        padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      }

      .picker-mask[data-open="true"] {
        display: flex;
      }

      .picker-sheet {
        width: 100%;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 14px 40px rgba(17, 24, 39, 0.2);
        overflow: hidden;
      }

      .picker-header {
        display: grid;
        grid-template-columns: 72px 1fr 72px;
        align-items: center;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .picker-title {
        text-align: center;
        font-size: 14px;
        font-weight: 700;
      }

      .picker-btn {
        border: none;
        background: transparent;
        padding: 8px 6px;
        font-size: 14px;
        color: var(--sub);
      }

      .picker-ok {
        color: var(--primary);
        font-weight: 700;
      }

      .picker-body {
        padding: 0;
      }

      .picker-path {
        display: flex;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid var(--line);
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      .picker-path::-webkit-scrollbar {
        display: none;
      }

      .picker-seg {
        border: 1px solid var(--line);
        background: rgba(107, 114, 128, 0.08);
        color: var(--sub);
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 14px;
        white-space: nowrap;
      }

      .picker-seg[data-active="true"] {
        background: rgba(37, 99, 235, 0.12);
        border-color: rgba(37, 99, 235, 0.24);
        color: var(--primary);
        font-weight: 700;
      }

      .picker-seg[aria-disabled="true"] {
        opacity: 0.5;
      }

      .picker-list {
        max-height: 46vh;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      .picker-item {
        width: 100%;
        border: none;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 52px;
        padding: 0 14px;
        font-size: 16px;
        color: var(--text);
        border-bottom: 1px solid var(--line);
        text-align: left;
      }

      .picker-item[data-selected="true"] {
        color: var(--primary);
        font-weight: 700;
      }

      .picker-item-right {
        display: flex;
        align-items: center;
        gap: 8px;
        color: rgba(107, 114, 128, 0.8);
        font-size: 14px;
      }

      .picker-chevron {
        width: 10px;
        height: 10px;
        border-right: 2px solid rgba(107, 114, 128, 0.6);
        border-bottom: 2px solid rgba(107, 114, 128, 0.6);
        transform: rotate(-45deg);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="title">新建收货地址</div>

      <section class="card" aria-label="创建收货地址表单">
        <div class="row">
          <div class="label">收货人</div>
          <div class="field">
            <input id="name" autocomplete="name" placeholder="请输入收货人姓名" maxlength="30" />
          </div>
        </div>

        <div class="row">
          <div class="label">手机号</div>
          <div class="field">
            <input id="phone" inputmode="numeric" autocomplete="tel" placeholder="请输入手机号" maxlength="20" />
          </div>
        </div>

        <div class="row">
          <div class="label">所在地区</div>
          <div id="regionField" class="field" role="button" tabindex="0" aria-label="选择所在地区">
            <input
              id="region"
              autocomplete="address-level1"
              placeholder="省 / 市 / 区"
              maxlength="60"
              readonly
              inputmode="none"
            />
            <div class="arrow" aria-hidden="true"></div>
          </div>
        </div>

        <div class="row">
          <div class="label">详细地址</div>
          <div class="field">
            <textarea
              id="detail"
              autocomplete="street-address"
              placeholder="街道、门牌号等（不要包含省市区）"
              maxlength="200"
            ></textarea>
          </div>
        </div>

        <div class="row">
          <div class="label">设为默认</div>
          <div class="field" style="justify-content: flex-end">
            <div id="defaultSwitch" class="switch" data-on="false">
              <input id="isDefault" type="checkbox" aria-label="设为默认地址" />
            </div>
          </div>
        </div>
      </section>

      <div id="error" class="error" role="alert"></div>
      <div class="hint">所在地区请用选择器选择；详细地址只填街道、门牌号等（不包含省市区）。</div>
    </main>

    <footer class="footer">
      <button id="saveBtn" class="btn" type="button">保存地址</button>
    </footer>

    <div id="toast" class="toast" aria-live="polite"></div>

    <div id="pickerMask" class="picker-mask" role="presentation">
      <div class="picker-sheet" role="dialog" aria-modal="true" aria-label="选择所在地区">
        <div class="picker-header">
          <button id="pickerCancel" class="picker-btn" type="button">取消</button>
          <div class="picker-title">选择所在地区</div>
          <button id="pickerOk" class="picker-btn picker-ok" type="button" disabled>确定</button>
        </div>
        <div class="picker-body">
          <div id="pickerPath" class="picker-path" role="tablist" aria-label="地区层级"></div>
          <div id="pickerList" class="picker-list" role="listbox" aria-label="地区选项"></div>
        </div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "shipping_addresses";
      const REGION_TREE = [
        {
          name: "北京市",
          cities: [{ name: "北京市", districts: ["东城区", "西城区", "朝阳区", "海淀区", "丰台区", "石景山区"] }],
        },
        {
          name: "上海市",
          cities: [{ name: "上海市", districts: ["黄浦区", "徐汇区", "长宁区", "静安区", "浦东新区", "闵行区"] }],
        },
        {
          name: "广东省",
          cities: [
            { name: "广州市", districts: ["越秀区", "天河区", "海珠区", "白云区", "番禺区"] },
            { name: "深圳市", districts: ["南山区", "福田区", "罗湖区", "宝安区", "龙岗区"] },
          ],
        },
        {
          name: "浙江省",
          cities: [
            { name: "杭州市", districts: ["上城区", "西湖区", "拱墅区", "滨江区", "余杭区"] },
            { name: "宁波市", districts: ["海曙区", "江北区", "鄞州区", "北仑区"] },
          ],
        },
        {
          name: "江苏省",
          cities: [
            { name: "南京市", districts: ["玄武区", "秦淮区", "建邺区", "鼓楼区", "雨花台区"] },
            { name: "苏州市", districts: ["姑苏区", "吴中区", "相城区", "虎丘区", "吴江区"] },
          ],
        },
        {
          name: "四川省",
          cities: [{ name: "成都市", districts: ["锦江区", "青羊区", "金牛区", "武侯区", "成华区"] }],
        },
      ];

      function $(id) {
        return document.getElementById(id);
      }

      function nowIso() {
        return new Date().toISOString();
      }

      function genId() {
        if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
        return String(Date.now()) + "-" + String(Math.random()).slice(2, 10);
      }

      function readAddresses() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const data = JSON.parse(raw);
          return Array.isArray(data) ? data : [];
        } catch {
          return [];
        }
      }

      function writeAddresses(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
      }

      function showError(message) {
        const el = $("error");
        if (!message) {
          el.style.display = "none";
          el.textContent = "";
          return;
        }
        el.textContent = message;
        el.style.display = "block";
      }

      let toastTimer = null;
      function toast(message) {
        const el = $("toast");
        el.textContent = message;
        el.style.display = "block";
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          el.style.display = "none";
          el.textContent = "";
        }, 1600);
      }

      function normalizePhone(v) {
        const s = String(v || "").trim();
        return s.replace(/\s+/g, "");
      }

      function isValidCNMobile(phone) {
        const p = normalizePhone(phone).replace(/^(\+?86)/, "");
        return /^1\d{10}$/.test(p);
      }

      function simplifyRegionName(name) {
        return String(name || "").replace(/(省|市|区|县|自治区|特别行政区)/g, "");
      }

      function buildRegionTokens(region) {
        const tokens = [];
        const parts = [region.province, region.city, region.district].filter(Boolean);
        for (const p of parts) {
          tokens.push(p);
          const s = simplifyRegionName(p);
          if (s && s !== p) tokens.push(s);
        }
        return Array.from(new Set(tokens)).filter(Boolean);
      }

      function getSelectedRegionText(region) {
        return [region.province, region.city, region.district].filter(Boolean).join(" ");
      }

      function stripRegionPrefix(detail, region) {
        let s = String(detail || "").trim();
        if (!s) return s;
        const tokens = buildRegionTokens(region);
        if (tokens.length === 0) return s;

        const separators = /^[\s,，、\-/_]+/;

        let changed = true;
        while (changed) {
          changed = false;
          s = s.replace(separators, "");
          for (const t of tokens) {
            if (t && s.startsWith(t)) {
              s = s.slice(t.length).replace(separators, "");
              changed = true;
            }
          }
        }
        return s;
      }

      function hasRegionInDetail(detail, region) {
        const s = String(detail || "").trim();
        if (!s) return false;
        const tokens = buildRegionTokens(region);
        if (tokens.length === 0) return false;
        const head = s.slice(0, 16);
        return tokens.some((t) => t && head.includes(t));
      }

      let selectedRegion = { province: "", city: "", district: "" };
      let pickerStep = 0;
      let tempRegion = { province: "", city: "", district: "" };

      function openPicker() {
        const mask = $("pickerMask");
        mask.dataset.open = "true";
        document.body.style.overflow = "hidden";
        initPickerState();
      }

      function closePicker() {
        const mask = $("pickerMask");
        mask.dataset.open = "false";
        document.body.style.overflow = "";
      }

      function getProvinceNames() {
        return REGION_TREE.map((p) => p.name);
      }

      function getCityNames(provinceName) {
        const p = REGION_TREE.find((x) => x.name === provinceName) || REGION_TREE[0];
        return (p?.cities || []).map((c) => c.name);
      }

      function getDistrictNames(provinceName, cityName) {
        const p = REGION_TREE.find((x) => x.name === provinceName) || REGION_TREE[0];
        const c = (p?.cities || []).find((x) => x.name === cityName) || p?.cities?.[0];
        return (c?.districts || []).slice();
      }

      function isCompleteRegion(region) {
        return Boolean(region.province && region.city && region.district);
      }

      function initPickerState() {
        tempRegion = { ...selectedRegion };
        const provinces = getProvinceNames();
        if (!provinces.includes(tempRegion.province)) tempRegion.province = "";
        if (tempRegion.province) {
          const cities = getCityNames(tempRegion.province);
          if (!cities.includes(tempRegion.city)) tempRegion.city = "";
          if (tempRegion.city) {
            const districts = getDistrictNames(tempRegion.province, tempRegion.city);
            if (!districts.includes(tempRegion.district)) tempRegion.district = "";
          } else {
            tempRegion.district = "";
          }
        } else {
          tempRegion.city = "";
          tempRegion.district = "";
        }

        if (!tempRegion.province) pickerStep = 0;
        else if (!tempRegion.city) pickerStep = 1;
        else pickerStep = 2;

        renderPicker();
      }

      function getOptionsByStep(step) {
        if (step === 0) return getProvinceNames();
        if (step === 1) return tempRegion.province ? getCityNames(tempRegion.province) : [];
        if (step === 2) return tempRegion.province && tempRegion.city ? getDistrictNames(tempRegion.province, tempRegion.city) : [];
        return [];
      }

      function getSelectedByStep(step) {
        if (step === 0) return tempRegion.province;
        if (step === 1) return tempRegion.city;
        if (step === 2) return tempRegion.district;
        return "";
      }

      function setSelectedByStep(step, value) {
        if (step === 0) {
          tempRegion.province = value;
          tempRegion.city = "";
          tempRegion.district = "";
          pickerStep = 1;
          renderPicker();
          return;
        }
        if (step === 1) {
          tempRegion.city = value;
          tempRegion.district = "";
          pickerStep = 2;
          renderPicker();
          return;
        }
        if (step === 2) {
          tempRegion.district = value;
          renderPicker();
          applyPickerSelection(true);
        }
      }

      function renderPicker() {
        const path = $("pickerPath");
        const list = $("pickerList");
        const ok = $("pickerOk");

        const segs = [
          { step: 0, key: "province", placeholder: "省", enabled: true },
          { step: 1, key: "city", placeholder: "市", enabled: Boolean(tempRegion.province) },
          { step: 2, key: "district", placeholder: "区", enabled: Boolean(tempRegion.province && tempRegion.city) },
        ];

        path.innerHTML = "";
        for (const seg of segs) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "picker-seg";
          btn.dataset.step = String(seg.step);
          btn.dataset.active = seg.step === pickerStep ? "true" : "false";
          btn.setAttribute("data-active", seg.step === pickerStep ? "true" : "false");
          btn.setAttribute("aria-disabled", seg.enabled ? "false" : "true");
          btn.textContent = tempRegion[seg.key] ? tempRegion[seg.key] : seg.placeholder;
          btn.addEventListener("click", () => {
            if (!seg.enabled) return;
            pickerStep = seg.step;
            renderPicker();
          });
          path.appendChild(btn);
        }

        const options = getOptionsByStep(pickerStep);
        const selected = getSelectedByStep(pickerStep);
        list.innerHTML = "";
        for (const opt of options) {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "picker-item";
          item.dataset.selected = opt === selected ? "true" : "false";
          item.setAttribute("data-selected", opt === selected ? "true" : "false");
          item.textContent = opt;

          const right = document.createElement("span");
          right.className = "picker-item-right";
          if (pickerStep < 2) {
            const chevron = document.createElement("span");
            chevron.className = "picker-chevron";
            right.appendChild(chevron);
          }
          item.appendChild(right);

          item.addEventListener("click", () => setSelectedByStep(pickerStep, opt));
          list.appendChild(item);
        }

        ok.disabled = !isCompleteRegion(tempRegion);
      }

      function applyPickerSelection(closeAfter) {
        if (!isCompleteRegion(tempRegion)) return;
        selectedRegion = { ...tempRegion };
        $("region").value = getSelectedRegionText(selectedRegion);

        const before = $("detail").value.trim();
        const after = stripRegionPrefix(before, selectedRegion);
        if (before && after !== before) {
          $("detail").value = after;
          toast("已去掉省市区，请只填详细地址");
        }

        if (closeAfter) closePicker();
      }

      function toAddressPayload() {
        const name = $("name").value.trim();
        const phone = normalizePhone($("phone").value);
        const regionText = $("region").value.trim();
        const rawDetail = $("detail").value.trim();
        const isDefault = $("isDefault").checked;

        if (!name) return { ok: false, error: "请填写收货人" };
        if (!phone) return { ok: false, error: "请填写手机号" };
        if (!isValidCNMobile(phone)) return { ok: false, error: "手机号格式不正确" };
        if (!regionText) return { ok: false, error: "请选择所在地区" };
        if (!rawDetail) return { ok: false, error: "请填写详细地址" };

        const cleanedDetail = stripRegionPrefix(rawDetail, selectedRegion);
        if (!cleanedDetail) return { ok: false, error: "详细地址请勿只包含省市区，请填写街道、门牌号等" };
        if (hasRegionInDetail(cleanedDetail, selectedRegion)) return { ok: false, error: "详细地址请勿包含省市区" };

        return {
          ok: true,
          value: {
            id: genId(),
            name,
            phone: normalizePhone(phone).replace(/^(\+?86)/, ""),
            region: regionText,
            regionParts: { ...selectedRegion },
            detail: cleanedDetail,
            isDefault,
            createdAt: nowIso(),
            updatedAt: nowIso(),
          },
        };
      }

      function setDefaultSwitch(on) {
        const box = $("isDefault");
        const wrap = $("defaultSwitch");
        box.checked = Boolean(on);
        wrap.dataset.on = box.checked ? "true" : "false";
      }

      function setSaving(saving) {
        const btn = $("saveBtn");
        btn.disabled = Boolean(saving);
        btn.textContent = saving ? "保存中..." : "保存地址";
      }

      $("isDefault").addEventListener("change", (e) => {
        setDefaultSwitch(e.target.checked);
      });

      $("defaultSwitch").addEventListener("click", () => {
        setDefaultSwitch(!$("isDefault").checked);
      });

      function openPickerFromTap() {
        openPicker();
      }

      $("region").addEventListener("click", openPickerFromTap);
      $("regionField").addEventListener("click", openPickerFromTap);
      $("regionField").addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openPickerFromTap();
        }
      });

      $("pickerCancel").addEventListener("click", () => {
        closePicker();
      });

      $("pickerMask").addEventListener("click", (e) => {
        if (e.target === $("pickerMask")) closePicker();
      });

      $("pickerOk").addEventListener("click", () => {
        applyPickerSelection(true);
      });

      $("detail").addEventListener("blur", () => {
        const before = $("detail").value.trim();
        if (!before) return;
        if (!$("region").value.trim()) return;
        const after = stripRegionPrefix(before, selectedRegion);
        if (after !== before) {
          $("detail").value = after;
          toast("已去掉省市区，请只填详细地址");
        }
      });

      $("saveBtn").addEventListener("click", async () => {
        showError("");
        const result = toAddressPayload();
        if (!result.ok) {
          showError(result.error);
          return;
        }

        setSaving(true);
        try {
          const list = readAddresses();
          let next = list.slice();
          const addr = result.value;
          if (addr.isDefault) next = next.map((a) => ({ ...a, isDefault: false, updatedAt: nowIso() }));
          next.unshift(addr);
          writeAddresses(next);

          toast("保存成功");
          setTimeout(() => {
            history.back();
          }, 600);
        } finally {
          setSaving(false);
        }
      });
    </script>
  </body>
</html>
