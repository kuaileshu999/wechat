<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦幻摩天轮</title>
    <style>
        :root {
            --sky-color: #1a1a2e;
            --wheel-color: #ffffff;
            --cabin-color: #ff4d4d;
            --spoke-color: rgba(255, 255, 255, 0.3);
            --ground-color: #16213e;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, var(--sky-color), #0f3460);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* 地面 */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: var(--ground-color);
            z-index: 1;
        }

        /* 摩天轮支架 */
        .stand {
            position: absolute;
            bottom: 100px;
            width: 200px;
            height: 300px;
            border-left: 10px solid var(--wheel-color);
            border-right: 10px solid var(--wheel-color);
            transform: perspective(500px) rotateX(45deg);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            background: var(--wheel-color);
            opacity: 0.8;
            z-index: 2;
        }

        /* 摩天轮主体 */
        .ferris-wheel {
            position: relative;
            bottom: 250px;
            width: 500px;
            height: 500px;
            z-index: 3;
        }

        .wheel-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 8px solid var(--wheel-color);
            border-radius: 50%;
            animation: rotate-wheel 20s linear infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 轮毂 */
        .hub {
            position: absolute;
            width: 40px;
            height: 40px;
            background: var(--wheel-color);
            border-radius: 50%;
            z-index: 10;
        }

        /* 辐条 */
        .spoke {
            position: absolute;
            width: 2px;
            height: 500px;
            background: var(--spoke-color);
        }

        /* 座舱容器 */
        .cabin-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* 座舱 */
        .cabin {
            position: absolute;
            width: 40px;
            height: 50px;
            background: var(--cabin-color);
            border-radius: 5px 5px 15px 15px;
            top: -25px;
            left: calc(50% - 20px);
            transform-origin: center top;
            animation: rotate-cabin 20s linear infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 座舱窗户 */
        .cabin::after {
            content: '';
            position: absolute;
            top: 10px;
            width: 25px;
            height: 15px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 3px;
        }

        /* 动画：轮子转动 */
        @keyframes rotate-wheel {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 动画：座舱反向旋转保持垂直 */
        @keyframes rotate-cabin {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        /* 星星背景 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        h1 {
            position: absolute;
            top: 20px;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            font-weight: 300;
            letter-spacing: 5px;
            z-index: 5;
        }
    </style>
</head>
<body>
    <h1>梦幻摩天轮</h1>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="stand"></div>
        <div class="ferris-wheel">
            <div class="wheel-outer" id="wheel">
                <div class="hub"></div>
                <!-- 辐条和座舱将由 JS 生成以减少冗余代码 -->
            </div>
        </div>
        <div class="ground"></div>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        const cabinCount = 12;
        const radius = 250;

        for (let i = 0; i < cabinCount; i++) {
            const angle = (i / cabinCount) * 360;
            
            // 创建辐条
            const spoke = document.createElement('div');
            spoke.className = 'spoke';
            spoke.style.transform = `rotate(${angle}deg)`;
            wheel.appendChild(spoke);

            // 创建座舱容器（为了定位）
            const wrapper = document.createElement('div');
            wrapper.className = 'cabin-wrapper';
            wrapper.style.transform = `rotate(${angle}deg)`;
            
            // 创建座舱
            const cabin = document.createElement('div');
            cabin.className = 'cabin';
            
            // 给座舱分配不同的颜色
            const colors = ['#ff4d4d', '#ff9f43', '#feca57', '#48dbfb', '#1dd1a1', '#ff6b6b'];
            cabin.style.backgroundColor = colors[i % colors.length];
            
            wrapper.appendChild(cabin);
            wheel.appendChild(wrapper);
        }

        // 生成星星
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.setProperty('--duration', `${2 + Math.random() * 3}s`);
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
